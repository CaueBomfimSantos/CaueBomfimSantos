


<script>
        // string 
        // const name = prompt (digite um nome)

        const n1 = 10
        const n2 = 7
        const aprovado = true
        const minimo = 9

        // operadores
        console.log(n1 + n2)
        console.log(n1 - n2)
        console.log(n1 * n2)
        console.log(n1 / n2)
        console.log(n1 % n2)
        
        
        // operadores
        console.log('operadores relacionais')
        console.log(n1 == n2)
        console.log(n1 != n2)
        console.log(n1 > n2)
        console.log(n1 < n2)
        console.log(n1 >= n2)
        console.log(n1 <= n2)
        
        console.log('operadores logicos')
        console.log(aprovado)
        console.log(!aprovado)
        console.log( n2 >= 7 && n2 >= minimo )
        console.log( n2 >= 7 || n2 >= minimo )




</script>
