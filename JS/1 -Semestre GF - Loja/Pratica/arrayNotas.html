<!DOCTYPE html>
<html lang="en">

<head>

    <title>arraysMultdimensionais</title>
    <meta charset="UTF-8">


    <script>
       notas = []

       const qtd = prompt('quantas notas? ')

       for(i = 0;i<qtd; i++){
        let nota = prompt('digite a '+ i +' nota')
        // o push é necessario para pegar a ultima nota que foi lancaça e por "em baixo" da ultima
        notas.push(nota)

         
       }
      console.table(notas)
    </script>


</head>

<body>

</body>

</html>
