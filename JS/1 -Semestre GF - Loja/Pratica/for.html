<!DOCTYPE html>
<html>  
    <head>  
        <title>Estutrura de repetição</title>
        
        <script>
            // inicialização
            // condição
            // incrimento
            const qtd = prompt('Quantas notas?')
            let nota = 0
            let soma = 0


            for(let i = 1; i <=qtd; i++ ){

                nota = Number(prompt('Digite a nota ' + i ))
                soma = soma + nota
            }
         
            console.log(soma)
        </script>
